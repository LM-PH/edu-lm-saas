<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Edu-LM - Control Escolar Inteligente</title>
    <meta name="description" content="Sistema de gestión y control escolar avanzado para instituciones educativas modernas.">
    
    <!-- PWA Core -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Edu-LM">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css?v=11">
</head>
<body>
    
    <div id="app"></div>

    <!-- Bibliotecas Externas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Lógica Principal Sincronizada (v114 + Watchdog v1) -->
    <script src="edu_lm_v112_universal.js?v=726"></script>

    <!-- Service Worker Registration REACTIVADO PARA ACTUALIZACIÓN FORZOSA -->
    <script>
      // Purga de Service Workers antiguos para forzar v116
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          for(let reg of regs) reg.unregister();
        });
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js?v=400')
            .then(reg => {
                console.log('Edu-LM PWA: Service Worker registrado.', reg);
                // Si hay una actualización, forzar el salto de espera
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            window.location.reload();
                        }
                    };
                };
            })
            .catch(err => console.log('Edu-LM PWA: Error al registrar SW.', err));
        });
      }
    </script>
</body>
</html>
